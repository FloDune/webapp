name: DevSecOps Pipeline (Cloud)

on:
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write
  packages: write # • Permission obligatoire demandée pour écrire dans GHCR

jobs:
  # 1. Scan de secrets (Job supplémentaire Gitleaks)
  gitleaks-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2. Tests unitaires + couverture
  unit-test:
    needs: gitleaks-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npm test
      - name: Sauvegarder la couverture
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # 3. SonarQube Cloud (SAST)
  sonar-check:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Recuperer la couverture
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage/
      - name: Analyse SonarQube Cloud
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # 4. Trivy - scan des dependances (SCA) avec export SARIF
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan du systeme de fichiers (Génération du rapport SARIF)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Publier les résultats Trivy au format SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # 5. Build et publication de l'image Docker sur GHCR
  build-image:
    needs: [ sonar-check, dependency-scan ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # • Connexion automatique à GHCR avec le GITHUB_TOKEN
      - name: Connexion au GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # • Passage du nom de l'image en minuscules (Obligatoire pour GHCR)
      - name: Convertir le nom du dépôt en minuscules
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/webapp" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      # • Build et Push direct de l'image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest

  # 6. Trivy - scan de l'image (conteneur) directement depuis GHCR
  container-scan:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Convertir le nom du dépôt en minuscules (pour le scan)
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/webapp" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Scan de l'image sur GHCR
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          severity: 'CRITICAL'
          exit-code: '1'
        env:
          TRIVY_USERNAME: ${{ github.repository_owner }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # 7. Déploiement automatique sur Render
  deploy:
    needs: container-scan
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
